# Cognee self-hosted stack for Soleri hybrid search
# Usage: docker compose -f docker/docker-compose.cognee.yml up -d
#
# Cognee provides vector embeddings + knowledge graph for vault entries.
# This is optional — everything works without it via FTS5 fallback.

services:
  cognee:
    image: cognee/cognee:latest
    ports:
      - '8000:8000'
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - GRAPH_DATABASE_PROVIDER=falkordb
      - GRAPH_DATABASE_URL=bolt://falkordb:6379
      - VECTOR_DB_PROVIDER=pgvector
      - VECTOR_DB_URL=postgresql://${COGNEE_DB_USER:-cognee}:${COGNEE_DB_PASSWORD:-cognee}@pgvector:5432/${COGNEE_DB_NAME:-cognee}
    depends_on:
      pgvector:
        condition: service_healthy
      falkordb:
        condition: service_started
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${COGNEE_DB_USER:-cognee}
      - POSTGRES_PASSWORD=${COGNEE_DB_PASSWORD:-cognee}
      - POSTGRES_DB=${COGNEE_DB_NAME:-cognee}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${COGNEE_DB_USER:-cognee}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

volumes:
  pgvector_data:
  falkordb_data:
