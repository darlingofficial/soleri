name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@soleri/core

      - name: Test core
        run: npm run test --workspace=@soleri/core

      - name: Build forge
        run: npm run build --workspace=@soleri/forge

      - name: Test forge
        run: npm run test --workspace=@soleri/forge

      - name: Build CLI
        run: npm run build --workspace=@soleri/cli

      - name: Test CLI
        run: npm run test --workspace=@soleri/cli

      - name: Publish @soleri/core
        run: |
          if npm view @soleri/core@$(node -p "require('./packages/core/package.json').version") version 2>/dev/null; then
            echo "Version already published — skipping"
          else
            npm publish --workspace=@soleri/core --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/forge
        run: |
          if npm view @soleri/forge@$(node -p "require('./packages/forge/package.json').version") version 2>/dev/null; then
            echo "Version already published — skipping"
          else
            npm publish --workspace=@soleri/forge --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/cli
        run: |
          if npm view @soleri/cli@$(node -p "require('./packages/cli/package.json').version") version 2>/dev/null; then
            echo "Version already published — skipping"
          else
            npm publish --workspace=@soleri/cli --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
