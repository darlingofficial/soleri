name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@soleri/core

      - name: Test core
        run: npm run test --workspace=@soleri/core

      - name: Build forge
        run: npm run build --workspace=@soleri/forge

      - name: Test forge
        run: npm run test --workspace=@soleri/forge

      - name: Publish @soleri/core
        run: npm publish --workspace=@soleri/core --access public || echo "Already published — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/forge
        run: npm publish --workspace=@soleri/forge --access public || echo "Already published — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
