name: Dead Code Audit

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write

jobs:
  audit:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install

      - name: Run knip
        id: knip
        run: |
          set +e
          npx knip > /tmp/knip-report.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run ts-prune
        id: tsprune
        run: |
          set +e
          npx ts-prune 2>&1 | grep -v '(used in module)' > /tmp/tsprune-report.txt
          has_unused=$( [ -s /tmp/tsprune-report.txt ] && echo "true" || echo "false" )
          echo "has_unused=$has_unused" >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.knip.outputs.exit_code != '0' || steps.tsprune.outputs.has_unused == 'true'
        uses: actions/github-script@v7
        env:
          KNIP_EXIT: ${{ steps.knip.outputs.exit_code }}
          TSPRUNE_HAS_UNUSED: ${{ steps.tsprune.outputs.has_unused }}
        with:
          script: |
            const fs = require('fs');
            const title = 'Dead Code Audit — Action Required';
            const label = 'dead-code';

            const knipReport = fs.readFileSync('/tmp/knip-report.txt', 'utf8').trim();
            const tspruneReport = fs.readFileSync('/tmp/tsprune-report.txt', 'utf8').trim();

            let body = '## Weekly Dead Code Audit\n\n';
            body += `**Run date:** ${new Date().toISOString().split('T')[0]}\n\n`;

            if (process.env.KNIP_EXIT !== '0') {
              body += '### knip\n\n```\n' + knipReport + '\n```\n\n';
            } else {
              body += '### knip\n\nClean.\n\n';
            }

            if (process.env.TSPRUNE_HAS_UNUSED === 'true') {
              body += '### ts-prune\n\n```\n' + tspruneReport + '\n```\n\n';
            } else {
              body += '### ts-prune\n\nClean.\n\n';
            }

            body += '---\n*Auto-generated by the Dead Code Audit workflow.*';

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'FBCA04',
                description: 'Dead code detected by weekly audit',
              });
            }

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              core.info(`Updated issue #${issues[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Created issue #${issue.number}`);
            }

      - name: All clean
        if: steps.knip.outputs.exit_code == '0' && steps.tsprune.outputs.has_unused != 'true'
        run: echo "No dead code found."
